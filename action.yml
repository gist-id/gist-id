name: gist.id build
description: Build a gist.id profile artefact into dist/.
branding:
  icon: file-text
  color: blue

inputs:
  builder-version:
    description: "Builder release tag to use (e.g. builder-v0.1.0). Default: latest."
    required: false
    default: latest
  out:
    description: "Output directory."
    required: false
    default: dist

runs:
  using: composite
  steps:
    - name: Download builder binary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        version="${{ inputs.builder-version }}"
        repo="gist-id/gist-id"

        if [ "$version" = "latest" ]; then
          tag=$(gh release view --repo "$repo" --json tagName --jq .tagName)
        else
          tag="$version"
        fi

        echo "Using builder release: $tag"

        gh release download "$tag" \
          --repo "$repo" \
          --pattern 'gist-id-x86_64-linux.tar.gz' \
          --pattern 'gist-id-x86_64-linux.tar.gz.sha256'

        sha256sum -c gist-id-x86_64-linux.tar.gz.sha256
        tar -xzf gist-id-x86_64-linux.tar.gz
        chmod +x gist-id
        echo "$(pwd)" >> "$GITHUB_PATH"

    - name: Run gist-id build
      shell: bash
      run: |
        gist-id build --out "${{ inputs.out }}"
