name: Deploy edge Worker

on:
  push:
    branches: ["main"]
    paths:
      - "crates/edge/**"
      - "crates/schema/**"
      - ".github/workflows/deploy-edge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-edge-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker-build
        run: cargo install -q worker-build

      - name: Deploy with wrangler
        working-directory: crates/edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy
